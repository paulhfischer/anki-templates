<div class="header">
    <span class="type">Beschriftetes Bild</span>
    <span class="tags"></span>
</div>

<div class="body">
    <div class="images"></div>
    <div id="original-image" style="display: none;">{{Bild}}</div>
    <script>
        (() => {
            const clozeData = (new DOMParser()).parseFromString(`{{cloze:Beschriftungen}}`, "text/html");
            const annotationID = clozeData.querySelector(".cloze").dataset.cloze;

            const imageElement = document.querySelector("#original-image > img");

            fetch(imageElement.src)
                .then((response) => response.text())
                .then((svgContent) => (new DOMParser()).parseFromString(svgContent, "text/html").querySelector("svg"))
                .then((svgElement) => {
                    svgElement.querySelectorAll(`svg > g:not([id="${annotationID}"])`).forEach((element) => element.style.display = "none");
                    svgElement.querySelectorAll(`svg > g[id="${annotationID}"] > .label`).forEach((element) => element.style.display = "none");
                    document.querySelector('.images').appendChild(svgElement);
                })
        })();
    </script>

    {{#Zusatzinformationen}}
        <div class="additional-infos">{{Zusatzinformationen}}</div>
    {{/Zusatzinformationen}}
</div>

<script>
    (() => {
        const originalTags = '{{Tags}}';
        const tags = originalTags
            .split(' ')
            .filter((tag) => tag !== 'leech')
            .join(', ');

        const tagsElement = document.querySelector('.tags');

        tagsElement.innerHTML = tags;
    })();
</script>
